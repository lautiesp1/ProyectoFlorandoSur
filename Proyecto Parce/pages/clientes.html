<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlorandoSur — Clientes</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span>Florando</span>Sur</a>
    <ul class="nav-links">
      <li><a href="../index.html">Dashboard</a></li>
      <li><a href="inventario.html">Inventario</a></li>
      <li><a href="clientes.html" class="active">Clientes</a></li>
      <li><a href="ventas.html">Ventas</a></li>
    </ul>
  </nav>

  <main class="container">

    <div class="page-header">
      <h1 class="page-title">Clientes</h1>
      <button class="btn btn-primary" onclick="abrirModalAgregar()">
        + Nuevo cliente
      </button>
    </div>

    <div class="card">
      <div class="search-bar">
        <input
          type="text"
          id="buscador"
          placeholder="Buscar por nombre, teléfono o email..."
          oninput="renderTabla()"
        />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Teléfono</th>
              <th>Email / Instagram</th>
              <th>Total compras</th>
              <th>Última compra</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-clientes">
            <tr>
              <td colspan="6" class="empty-state"
                style="text-align:center; padding:24px">
                Cargando...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- ── Modal agregar / editar cliente ── -->
  <div class="modal-overlay" id="modal-cliente">
    <div class="modal">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-titulo">Nuevo cliente</h2>
        <button class="modal-close" onclick="cerrarModal('modal-cliente')">✕</button>
      </div>

      <input type="hidden" id="cli-id" />

      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="cli-nombre" placeholder="Ej: Juan Pérez" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <input type="tel" id="cli-telefono" placeholder="+54 9 351 xxx xxxx" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cli-email" placeholder="cliente@email.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Instagram / Red social</label>
        <input type="text" id="cli-instagram" placeholder="@usuario" />
      </div>

      <div class="form-group">
        <label>Notas</label>
        <textarea id="cli-notas" rows="2"
          placeholder="Preferencias, sabores favoritos, etc."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="cerrarModal('modal-cliente')">
          Cancelar
        </button>
        <button class="btn btn-primary" onclick="guardarCliente()">
          Guardar cliente
        </button>
      </div>

    </div>
  </div>

  <!-- ── Modal historial de compras ── -->
  <div class="modal-overlay" id="modal-historial">
    <div class="modal" style="max-width:540px">

      <div class="modal-header">
        <h2 class="modal-title" id="hist-titulo">Historial de compras</h2>
        <button class="modal-close" onclick="cerrarModal('modal-historial')">✕</button>
      </div>

      <div id="hist-contenido"></div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="cerrarModal('modal-historial')">
          Cerrar
        </button>
      </div>

    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/clientes.js"></script>
</body>
</html>
